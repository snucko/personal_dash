name = "personal-dashboard"
type = "javascript"
account_id = ""
workers_dev = true
main = "dist/index.js"

[env.production]
name = "personal-dashboard-prod"
route = "personal-dashboard.example.com/*"
zone_id = ""

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.{ts,tsx}", "index.html"]

[build.upload]
format = "service-worker"
